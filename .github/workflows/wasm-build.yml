name: WASM Build

on:
  push:
    branches: [main, master]
    paths:
      - 'crates/**'
      - '.github/workflows/wasm-build.yml'
  pull_request:
    paths:
      - 'crates/**'
      - '.github/workflows/wasm-build.yml'

jobs:
  cargo-test:
    name: Cargo test (native)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: crates

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crates/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace

  wasm-pack:
    name: wasm-pack build (teotl_wasm)
    runs-on: ubuntu-latest
    needs: cargo-test
    permissions:
      contents: read

    defaults:
      run:
        working-directory: crates

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('crates/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build WASM
        run: wasm-pack build teotl_wasm --target web --out-dir ../web/src/wasm
