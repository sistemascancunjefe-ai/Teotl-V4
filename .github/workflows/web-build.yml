name: Web Build

on:
  push:
    branches: [main, master]
    paths:
      - 'web/**'
      - '.github/workflows/web-build.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-build.yml'

jobs:
  build:
    name: TypeScript type-check & Vite build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create WASM mock
        run: |
          mkdir -p src/wasm
          if [ ! -f src/wasm/teotl_wasm.js ]; then
            echo 'export default async function init() {}; export class TeotlWasm { init() {} }' > src/wasm/teotl_wasm.js
          fi
          if [ ! -f src/wasm/teotl_wasm.d.ts ]; then
            echo 'declare module "../wasm/teotl_wasm" { export default function init(): Promise<any>; export class TeotlWasm { init(): void; } }' > src/wasm/teotl_wasm.d.ts
          fi

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
